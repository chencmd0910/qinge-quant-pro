# 青鳄量化 Pro - Docker Compose 部署配置
# 使用: docker-compose -f deploy/docker-compose.yml up -d

version: "3.8"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: qinge-pro-backend
    ports:
      - "8000:8000"
    volumes:
      - qinge_data:/app/data
    environment:
      - PAPER_TRADING_DATA_DIR=/app/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ../frontend-next
      dockerfile: Dockerfile
    container_name: qinge-pro-frontend
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  qinge_data:
