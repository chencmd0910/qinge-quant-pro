version: "3.8"

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: qinge-postgres
    environment:
      POSTGRES_DB: qinge_quant
      POSTGRES_USER: qinge
      POSTGRES_PASSWORD: qinge123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qinge"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: qinge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qinge-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://qinge:qinge123@postgres:5432/qinge_quant
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./strategies:/app/strategies
      - ./backend/app:/app/app

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qinge-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
